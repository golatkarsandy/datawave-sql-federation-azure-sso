###############################################
# Trino Node & Coordinator Settings
###############################################
coordinator=true
node-scheduler.include-coordinator=true

###############################################
# Disable HTTP (Trino 437-compatible)
###############################################
http-server.http.port=0

###############################################
# Enable HTTPS (required for OAuth2 + Web UI)
###############################################
http-server.https.enabled=true
http-server.https.port=8443
http-server.https.keystore.path=/etc/trino/keystore.jks
http-server.https.keystore.key=password

###############################################
# Discovery must use HTTPS
###############################################
discovery.uri=https://localhost:8443

###############################################
# Internal communication trust for self-signed cert
###############################################
internal-communication.shared-secret=supersecretvalue123
internal-communication.https.required=false
internal-communication.https.keystore.path=/etc/trino/keystore.jks
internal-communication.https.keystore.key=password

###############################################
# Web UI
###############################################
web-ui.enabled=true

###############################################
# Authentication (OAuth2 for UI + Password for JDBC)
###############################################
http-server.authentication.type=oauth2,password

# Password authentication for JDBC (Metabase)
password-authenticator.name=file
file.password-file=/etc/trino/password.db

###############################################
# OAuth2 (Azure AD)
###############################################
http-server.authentication.oauth2.issuer=https://login.microsoftonline.com/9de4ba41-1d14-4ee6-a1ff-47ff3de8e4b1/v2.0
http-server.authentication.oauth2.auth-url=https://login.microsoftonline.com/9de4ba41-1d14-4ee6-a1ff-47ff3de8e4b1/oauth2/v2.0/authorize
http-server.authentication.oauth2.token-url=https://login.microsoftonline.com/9de4ba41-1d14-4ee6-a1ff-47ff3de8e4b1/oauth2/v2.0/token

http-server.authentication.oauth2.client-id=507fe3ca-889c-404d-beb5-a8b2def71a0f
http-server.authentication.oauth2.client-secret=Rbw8Q~NMCeGCl9wlHdS8UiW542A8zl88MbhG.cRI

http-server.authentication.oauth2.scopes=openid,email,profile
